name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: List files
        run: find . -name "*.java" -o -name "*.json" -o -name "*.gradle" | head -50

      - name: Setup Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.8
          chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: auto-loot-mod
          path: build/libs/*.jar
