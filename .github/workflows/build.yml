name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.11
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11-bin.zip
          unzip -q gradle-8.11-bin.zip
          export PATH=$PWD/gradle-8.11/bin:$PATH
          gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: auto-loot-mod
          path: build/libs/*.jar
