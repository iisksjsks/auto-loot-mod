name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Fix wrapper and build
        run: |
          sed -i 's/gradle-8.8-bin/gradle-8.11-bin/g' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties
          bash gradlew build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: auto-loot-mod
          path: build/libs/*.jar
